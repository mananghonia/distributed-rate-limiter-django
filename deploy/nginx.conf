# Load balancer in front of the 3 gateway instances. Docker's internal DNS
# resolves "gateway" to all replicas; nginx round-robins across them, so a
# single client's requests deliberately land on different instances --
# exactly the scenario the distributed limiter has to survive.
upstream gateway_pool {
    server gateway:8000;
}

server {
    listen 80;

    location / {
        proxy_pass http://gateway_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
