name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        env:
          # Use the in-process fakeredis fallback -- no Redis service needed;
          # the atomic Lua path is identical, so the tests exercise real logic.
          RATELIMIT_USE_FAKEREDIS: "1"
        run: python manage.py test ratelimiter -v2
